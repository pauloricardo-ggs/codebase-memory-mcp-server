worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    server_tokens off;
    limit_req_zone $binary_remote_addr zone=admin_per_ip:10m rate=20r/s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Algumas versões do binário UI não informam corretamente o MIME dos
    # assets embutidos. Com nosniff ativo, o navegador recusa CSS e JavaScript.
    map $uri $graph_content_type {
        default $upstream_http_content_type;
        ~*\.css$ text/css;
        ~*\.js$ application/javascript;
        ~*\.mjs$ application/javascript;
        ~*\.json$ application/json;
        ~*\.svg$ image/svg+xml;
        ~*\.wasm$ application/wasm;
        ~*\.woff$ font/woff;
        ~*\.woff2$ font/woff2;
    }

    server {
        listen 8080 default_server;
        server_name _;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        location = /healthz {
            auth_basic off;
            access_log off;
            return 200 "ok\n";
        }

        location = /admin {
            auth_basic "Codebase Memory Admin";
            auth_basic_user_file /etc/nginx/secrets/.htpasswd;
            limit_req zone=admin_per_ip burst=40 nodelay;

            # Serve o painel diretamente, sem depender de redirect no browser.
            proxy_pass http://admin:3000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 5s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location ^~ /admin/ {
            auth_basic "Codebase Memory Admin";
            auth_basic_user_file /etc/nginx/secrets/.htpasswd;
            limit_req zone=admin_per_ip burst=40 nodelay;

            # A barra final remove /admin/ antes de encaminhar ao backend.
            proxy_pass http://admin:3000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 5s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location / {
            auth_basic "Codebase Memory";
            auth_basic_user_file /etc/nginx/secrets/.htpasswd;
            limit_req zone=admin_per_ip burst=40 nodelay;

            proxy_pass http://127.0.0.1:9749;
            proxy_http_version 1.1;
            proxy_hide_header Content-Type;
            add_header Content-Type $graph_content_type always;
            add_header X-Content-Type-Options nosniff always;
            add_header X-Frame-Options DENY always;
            add_header Referrer-Policy no-referrer always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            # A UI oficial rejeita qualquer Host que não seja loopback.
            proxy_set_header Host localhost:9749;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 5s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
