worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    server_tokens off;
    limit_req_zone $binary_remote_addr zone=public_per_ip:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login_per_ip:10m rate=5r/m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Preserva HTTPS quando TLS termina no balanceador/proxy externo.
    map $http_x_forwarded_proto $effective_forwarded_proto {
        default $scheme;
        ~*^https(?:,|$) https;
    }

    server {
        listen 8080 default_server;
        server_name _;
        client_max_body_size 512m;

        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        location = /mcp {
            limit_req zone=public_per_ip burst=60 nodelay;
            proxy_pass http://agentgateway:${UI_PORT}/mcp;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $effective_forwarded_proto;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-API-Key $http_x_api_key;
            proxy_buffering off;
            proxy_cache off;
            proxy_connect_timeout 5s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location = /mcp/ {
            return 308 /mcp;
        }

        location = /admin {
            return 308 /admin/;
        }

        # Health e métricas permanecem disponíveis somente na rede Docker.
        location ~ ^/admin/api/(?:health(?:/.*)?|metrics)$ {
            return 404;
        }

        location = /admin/api/auth/login {
            limit_req zone=login_per_ip burst=5 nodelay;
            proxy_pass http://admin:3000/api/auth/login;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $effective_forwarded_proto;
        }

        location /admin/ {
            limit_req zone=public_per_ip burst=60 nodelay;
            proxy_pass http://admin:3000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $effective_forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 5s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location = /grafana {
            return 308 /grafana/;
        }

        location ^~ /grafana/ {
            limit_req zone=public_per_ip burst=60 nodelay;
            set $grafana_upstream http://grafana:3000;
            proxy_pass $grafana_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $effective_forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_connect_timeout 5s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # O Open WebUI é a aplicação principal e precisa preservar rotas,
        # assets, uploads, streaming e WebSockets na raiz do domínio.
        location / {
            limit_req zone=public_per_ip burst=120 nodelay;
            proxy_pass http://open-webui:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $effective_forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_connect_timeout 10s;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    }
}
