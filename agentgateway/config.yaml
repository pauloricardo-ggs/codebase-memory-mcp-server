# yaml-language-server: $schema=https://agentgateway.dev/schema/config

config:
  adminAddr: 0.0.0.0:15000

mcp:
  # configure.sh substitui os marcadores de porta e token antes do boot.
  # A Admin UI lê o YAML sem expandir variáveis de ambiente.
  port: __UI_PORT__
  policies:
    apiKey:
      mode: strict
      keys:
        - key: __MCP_SYSTEM_TOKEN__
          metadata:
            managedBy: codebase-memory-admin
            userId: system-playground
            user: Sistema / Playground
            identity: system@local
    cors:
      allowOrigins: ["*"]
      allowHeaders: ["*"]
      exposeHeaders: ["Mcp-Session-Id"]
    mcpGuardrails:
      processors:
        - kind: remote
          methods:
            tools/call: full
            tools/list: response
          host: admin:3001
          failureMode: failClosed
          metadata:
            userId: apiKey.userId
            toolName: mcp.tool.name
          requestHeaders:
            allowed: []
  targets:
    - name: codebase-memory
      stdio:
        cmd: /usr/local/bin/codebase-memory-mcp
