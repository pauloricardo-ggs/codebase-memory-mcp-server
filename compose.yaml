name: codebase-memory

services:
  agentgateway-config:
    image: alpine:3.22
    user: "${LOCAL_UID}:${LOCAL_GID}"
    restart: "no"
    environment:
      UI_PORT: "${UI_PORT:-8787}"
    volumes:
      - ./data/agentgateway:/config
      - ./data/secrets:/secrets
      - ./agentgateway/config.yaml:/bootstrap/config.yaml:ro
      - ./agentgateway/configure.sh:/usr/local/bin/configure-agentgateway:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/configure-agentgateway"]

  agentgateway:
    build:
      context: .
      dockerfile: agentgateway/Dockerfile
    image: codebase-memory-agentgateway:1.3.1-git
    user: "${LOCAL_UID}:${LOCAL_GID}"
    init: true
    restart: unless-stopped
    depends_on:
      agentgateway-config:
        condition: service_completed_successfully
    command: ["-f", "/config/config.yaml"]
    environment:
      UI_PORT: "${UI_PORT:-8787}"
      CBM_ALLOWED_ROOT: /data/repositories
      CBM_CACHE_DIR: /data/cache
      CBM_MEM_BUDGET_MB: "${CBM_MEM_BUDGET_MB}"
    volumes:
      - ./data/agentgateway:/config
      - ./repositories:/data/repositories:ro
      - ./cache:/data/cache
      - ${CBM_HOST_BIN}:/usr/local/bin/codebase-memory-mcp:ro
    expose:
      - "${UI_PORT:-8787}"
      - "15000"

  agentgateway-ready:
    image: alpine:3.22
    restart: "no"
    depends_on:
      agentgateway:
        condition: service_started
    environment:
      UI_PORT: "${UI_PORT:-8787}"
    volumes:
      - ./agentgateway/wait-ready.sh:/usr/local/bin/wait-agentgateway:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/wait-agentgateway"]

  admin:
    build:
      context: ./app
    user: "${LOCAL_UID}:${LOCAL_GID}"
    init: true
    restart: unless-stopped
    depends_on:
      agentgateway:
        condition: service_started
    env_file:
      - path: ./data/secrets/admin.env
        required: false
    environment:
      PORT: "3000"
      APP_DATA_DIR: /data/app
      CBM_ALLOWED_ROOT: /data/repositories
      CBM_CACHE_DIR: /data/cache
      CBM_MEM_BUDGET_MB: "${CBM_MEM_BUDGET_MB}"
      CBM_BIN: /usr/local/bin/codebase-memory-mcp
      UI_PORT: "${UI_PORT:-8787}"
      ADMIN_JWT_SECRET_FILE: /data/app/secrets/admin-jwt-secret
      WORKSPACE_TIMEZONE: "${WORKSPACE_TIMEZONE:-America/Maceio}"
      REPOSITORY_SYNC_CONCURRENCY: "${REPOSITORY_SYNC_CONCURRENCY:-3}"
      AGENTGATEWAY_ADMIN_URL: http://agentgateway:15000
      MCP_GUARDRAIL_ADDR: 0.0.0.0:3001
      MCP_GUARDRAIL_HOST: admin:3001
      KNOWLEDGE_SYNC_ENABLED: "true"
      KNOWLEDGE_SYNC_URL: http://knowledge-sync:3002
      KNOWLEDGE_SYNC_TOKEN_FILE: /data/app/secrets/knowledge-sync/knowledge-sync-token
    volumes:
      - ./data:/data/app
      - ./repositories:/data/repositories
      - ./cache:/data/cache
      - ${CBM_HOST_BIN}:/usr/local/bin/codebase-memory-mcp:ro
    expose:
      - "3000"
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s

  proxy:
    image: nginx:1.27-alpine
    user: "${LOCAL_UID}:${LOCAL_GID}"
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "envsubst '$$UI_PORT' < /etc/nginx/nginx.conf.template > /tmp/nginx.conf && exec nginx -c /tmp/nginx.conf -g 'daemon off;'"
    environment:
      UI_PORT: "${UI_PORT:-8787}"
    depends_on:
      agentgateway-ready:
        condition: service_completed_successfully
      admin:
        condition: service_healthy
      open-webui:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
    ports:
      - "${UI_PORT:-8787}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s

  ollama:
    image: ollama/ollama:${OLLAMA_VERSION:-0.32.1}
    profiles: ["ollama-docker"]
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  docling:
    image: quay.io/docling-project/docling-serve-cpu:${DOCLING_VERSION:-v1.26.0}
    restart: unless-stopped
    environment:
      DOCLING_SERVE_ENABLE_UI: "false"
      DOCLING_SERVE_MAX_SYNC_WAIT: "600"
      DOCLING_SERVE_ENG_LOC_NUM_WORKERS: "1"
      DOCLING_SERVE_ENG_LOC_SHARE_MODELS: "true"
      DOCLING_SERVE_OPTIONS_CACHE_SIZE: "1"
      DOCLING_SERVE_LOAD_MODELS_AT_BOOT: "false"
      DOCLING_DEVICE: cpu
      DOCLING_NUM_THREADS: "${DOCLING_CPU_THREADS:-6}"
      UVICORN_WORKERS: "1"
      OMP_NUM_THREADS: "${DOCLING_CPU_THREADS:-6}"
      MKL_NUM_THREADS: "${DOCLING_CPU_THREADS:-6}"
    expose:
      - "5001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  open-webui:
    build:
      context: ./openwebui
    image: codebase-memory-open-webui:0.10.2-google-drive-config
    restart: unless-stopped
    depends_on:
      docling:
        condition: service_healthy
    env_file:
      - ./data/secrets/openwebui.env
    environment:
      WEBUI_URL: "${PUBLIC_BASE_URL:-http://localhost:8787}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://ollama:11434}"
      RAG_EMBEDDING_ENGINE: ollama
      RAG_EMBEDDING_MODEL: bge-m3
      CONTENT_EXTRACTION_ENGINE: docling
      DOCLING_SERVER_URL: http://docling:5001
      DOCLING_PARAMS: '{"do_ocr":true,"force_ocr":false,"table_mode":"accurate","pipeline":"standard","ocr_engine":"tesseract","ocr_lang":["por","eng"]}'
      ENABLE_RAG_HYBRID_SEARCH: "true"
      RAG_RERANKING_ENGINE: ""
      RAG_RERANKING_MODEL: "${RAG_RERANKING_MODEL-BAAI/bge-reranker-v2-m3}"
      RAG_RERANKING_BATCH_SIZE: "${RAG_RERANKING_BATCH_SIZE:-4}"
      RAG_TOP_K: "${RAG_TOP_K:-20}"
      RAG_TOP_K_RERANKER: "${RAG_TOP_K_RERANKER:-8}"
      ENABLE_KB_EXEC: "true"
      ENABLE_SIGNUP: "false"
      DEFAULT_USER_ROLE: pending
      AIOHTTP_CLIENT_TIMEOUT_TOOL_SERVER: "120"
    volumes:
      - openwebui-data:/app/backend/data
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  openwebui-bootstrap:
    build:
      context: ./openwebui/bootstrap
    restart: "no"
    depends_on:
      open-webui:
        condition: service_healthy
      proxy:
        condition: service_healthy
    env_file:
      - ./data/secrets/openwebui.env
    environment:
      OPENWEBUI_URL: http://open-webui:8080
      OLLAMA_URL: "${OLLAMA_BASE_URL:-http://ollama:11434}"
      OLLAMA_CHAT_MODEL: "${OLLAMA_CHAT_MODEL:-gemma4:e2b}"
      OLLAMA_EMBEDDING_MODEL: bge-m3
      RAG_RERANKING_MODEL: "${RAG_RERANKING_MODEL-BAAI/bge-reranker-v2-m3}"
      RAG_RERANKING_BATCH_SIZE: "${RAG_RERANKING_BATCH_SIZE:-4}"
      RAG_TOP_K: "${RAG_TOP_K:-20}"
      RAG_TOP_K_RERANKER: "${RAG_TOP_K_RERANKER:-8}"
      MCP_ADMIN_URL: http://proxy:8080/mcp
      MCP_SYSTEM_TOKEN_FILE: /run/cbm-secrets/mcp-system-token
    volumes:
      - ./openwebui/bootstrap:/bootstrap:ro
      - ./data/secrets:/run/cbm-secrets:ro

  knowledge-sync:
    build:
      context: ./knowledge-sync
    image: codebase-memory-knowledge-sync:0.1.0
    user: "${LOCAL_UID}:${LOCAL_GID}"
    init: true
    restart: unless-stopped
    depends_on:
      open-webui:
        condition: service_healthy
    env_file:
      - ./data/secrets/openwebui.env
    environment:
      PORT: "3002"
      SYNC_DATA_DIR: /data
      OPENWEBUI_URL: http://open-webui:8080
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google-drive-service-account.json
      KNOWLEDGE_SYNC_TOKEN_FILE: /run/secrets/knowledge-sync-token
      KNOWLEDGE_SYNC_TIMEZONE: "${WORKSPACE_TIMEZONE:-America/Maceio}"
      KNOWLEDGE_SYNC_FULL_RECONCILIATION_HOURS: "${KNOWLEDGE_SYNC_FULL_RECONCILIATION_HOURS:-168}"
      KNOWLEDGE_SYNC_HTTP_RETRY_ATTEMPTS: "${KNOWLEDGE_SYNC_HTTP_RETRY_ATTEMPTS:-3}"
    volumes:
      - ./data/knowledge-sync:/data
      - ./data/secrets/knowledge-sync:/run/secrets:ro
    expose:
      - "3002"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3002/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s

  prometheus:
    image: prom/prometheus:v3.7.3
    profiles: ["monitoring"]
    restart: unless-stopped
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus", "--storage.tsdb.retention.time=30d"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    expose:
      - "9090"

  grafana:
    image: grafana/grafana:12.3.1
    profiles: ["monitoring"]
    restart: unless-stopped
    depends_on:
      - prometheus
    env_file:
      - path: ./data/secrets/monitoring.env
        required: false
    environment:
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "${PUBLIC_BASE_URL:-http://localhost:8787}/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/codebase-memory-operation.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    expose:
      - "3000"

volumes:
  ollama-data:
  openwebui-data:
  prometheus-data:
  grafana-data:
