<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Entrar · Codebase Memory Admin</title>
  <link rel="stylesheet" href="/admin/styles.css">
</head>
<body class="login-page">
  <main class="login-card">
    <div class="brand login-brand"><span class="brand-mark">CM</span><div><strong>Codebase Memory</strong><small>Admin console</small></div></div>
    <div><p class="eyebrow">Acesso administrativo</p><h1>Entre para continuar</h1><p class="login-copy">Use a credencial administrativa definida durante a instalação.</p></div>
    <form id="login-form" class="login-form">
      <div class="field"><label for="username">E-mail</label><input id="username" name="username" type="email" autocomplete="username" required autofocus></div>
      <div class="field"><label for="password">Senha</label><input id="password" name="password" type="password" autocomplete="current-password" required></div>
      <p id="login-error" class="login-error" role="alert" hidden></p>
      <button class="button primary" type="submit">Entrar</button>
    </form>
  </main>
  <script type="module" src="/admin/login.js"></script>
</body>
</html>
